name: Publish Notes to Bluesky

on:
  # Chain off a successful Fly Deploy so the blog page for a new note
  # is live BEFORE the bsky post (which links to that page) gets
  # created. The previous trigger fired in parallel with rust_tests/
  # fly_deploy, which meant tapping the link from bsky right after
  # syndication could 404.
  workflow_run:
    workflows: ["Fly Deploy"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: bluesky-publish
  cancel-in-progress: false

env:
  SQLX_OFFLINE: true
  APP_BASE_URL: https://coreyja.com

jobs:
  publish:
    name: Publish Notes to Bluesky
    runs-on: ubuntu-latest
    # workflow_dispatch always runs. workflow_run only runs when the
    # upstream Fly Deploy succeeded; a failed deploy means the page
    # isn't live, so we shouldn't publish a link to it.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Generate App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Setup | Checkout
        uses: actions/checkout@v4
        with:
          # Always check out the tip of main, not the SHA that triggered the
          # workflow. Without this, a queued run for an older commit could see
          # stale notes (missing bsky_url updates pushed by an earlier run)
          # and re-publish them.
          ref: main
          # Authenticate git operations as the App so the push bypasses the
          # main-branch ruleset (App is a bypass actor) and so the push
          # triggers downstream workflows (App tokens trigger runs, unlike
          # the default GITHUB_TOKEN).
          token: ${{ steps.app-token.outputs.token }}

      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: protobuf-compiler libasound2-dev
          version: v0

      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2

      - name: Build Tailwind CSS
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 && \
          chmod +x tailwindcss-linux-x64 && \
          mv tailwindcss-linux-x64 tailwindcss && \
          ./tailwindcss -i server/src/styles/tailwind.css -o target/tailwind.css

      - name: Build release binary
        run: cargo build --release

      - name: Publish to Bluesky
        id: publish
        # Don't abort on partial failures — surface them but let the commit
        # step push whatever bsky_urls did get written. The next run retries
        # the failures via the idempotency check.
        continue-on-error: true
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: ./target/release/server publish-bluesky --dir notes

      - name: Sync standard.site
        id: sync_standard
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: ./target/release/server publish-standard-site sync --key blog

      - name: Commit syndication updates
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add notes/ blog/ publications.toml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync syndication state"
            # Rebase onto whatever main looks like *now* — covers the case
            # where main moved during this workflow run.
            git pull --rebase origin main
            git push
          fi

      - name: Surface publish failures
        # Marks the run red so failures are visible. Runs last so partial
        # successes still got committed/pushed/deployed via the steps above.
        if: steps.publish.outcome == 'failure' || steps.sync_standard.outcome == 'failure'
        run: |
          echo "::error::One or more publishes failed. See logs. Next run will retry."
          exit 1
